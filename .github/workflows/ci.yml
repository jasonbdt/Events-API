name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Start container
        run: docker run -d -p 5000:5000 --name events-api events-api:latest

      - name: Health check
        run: |
          response=$(curl -sf http://localhost:5000/api/health)
          echo "Response: $response"
          echo "$response" | grep -q '"status": "healthy"'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        env:
          BASE_URL: http://localhost:5000
        run: pytest -v

      - name: Print container logs
        if: always()
        run: docker logs events-api || true

      - name: Stop and remove container
        if: always()
        run: docker rm -f events-api || true
