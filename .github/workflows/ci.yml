name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -t events-api:latest .

      - name: Start container
        run: docker run -d -p 5000:5000 --name events-api events-api:latest

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 30); do                                                                                                                                                  
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' events-api)                                                                                                 
            echo "Attempt $i: $STATUS"                                                                                                                                              
            [ "$STATUS" = "healthy" ] && exit 0                                                                                                                                     
            [ "$STATUS" = "unhealthy" ] && docker logs events-api && exit 1                                                                                                         
            sleep 2                                                                                                                                                                 
          done                                                                                                                                                                      
          docker logs events-api                                                                                                                                                    
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        env:
          BASE_URL: http://localhost:5000
        run: pytest -v

      - name: Print container logs
        if: always()
        run: docker logs events-api || true

      - name: Stop and remove container
        if: always()
        run: docker rm -f events-api || true

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/events-api:latest

      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Wait for Render to roll out
        run: |
          for i in $(seq 1 20); do
            if curl -sf "${{ secrets.RENDER_BASE }}/api/health" > /dev/null; then
              echo "Render is healthy after $i attempt(s)"
              exit 0
            fi
            echo "Attempt $i: not ready, retrying in 15s..."
            sleep 15
          done
          echo "Render did not become healthy in time"
          exit 1

      - name: Smoke test
        run: |
          response=$(curl -sf "${{ secrets.RENDER_BASE }}/api/health")
          echo "Response: $response"
          echo "$response" | grep -q '"status": "healthy"'
